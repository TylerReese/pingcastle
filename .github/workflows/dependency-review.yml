name: Dependency Review

on:
  pull_request:
    branches: ["master"]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce packages with known vulnerabilities.
          # "high" catches CVEs rated High or Critical.
          fail-on-severity: high
          # Post a comment on the PR summarizing any new vulnerable dependencies.
          comment-summary-in-pr: always
          # Also warn on packages with licenses incompatible with open-source distribution.
          # Adjust this list to match your licensing requirements.
          deny-licenses: AGPL-3.0, GPL-2.0, GPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0
