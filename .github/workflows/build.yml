name: Build Release

on:
  workflow_dispatch:

jobs:
  build:
    name: Build and publish artifacts
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Restore NuGet packages
        run: dotnet restore PingCastle/PingCastle.csproj

      - name: Restore NuGet packages (AutoUpdater)
        run: dotnet restore PingCastleAutoUpdater/PingCastleAutoUpdater.csproj

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $version = ([xml](Get-Content Directory.Build.props)).Project.PropertyGroup.Version
          $buildVersion = "$version.${{ github.run_number }}"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "FILE_VERSION=$buildVersion" >> $env:GITHUB_OUTPUT
          echo "Building version $buildVersion"

      - name: Publish PingCastle
        run: >
          dotnet publish PingCastle/PingCastle.csproj
          --configuration Release
          --no-restore
          --output ./artifacts
          -p:FileVersion=${{ steps.version.outputs.FILE_VERSION }}

      - name: Publish PingCastleAutoUpdater
        run: >
          dotnet publish PingCastleAutoUpdater/PingCastleAutoUpdater.csproj
          --configuration Release
          --no-restore
          --output ./artifacts
          -p:FileVersion=${{ steps.version.outputs.FILE_VERSION }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PingCastle-${{ steps.version.outputs.VERSION }}
          path: ./artifacts/
          if-no-files-found: error
          retention-days: 90
